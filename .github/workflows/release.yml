name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional Maven version (YYYY.MM.DD.HHmm). Leave empty to auto-generate from current UTC time."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-central:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java, Maven server credentials, and GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.release_version }}"
          if [ -n "${INPUT_VERSION}" ]; then
            RELEASE_VERSION="${INPUT_VERSION}"
          else
            RELEASE_VERSION="$(date -u +'%Y.%m.%d.%H%M')"
          fi
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "Release version: ${RELEASE_VERSION}"

      - name: Set Maven project version
        run: mvn -B -ntp -DnewVersion="${{ steps.release_version.outputs.release_version }}" -DgenerateBackupPoms=false versions:set

      - name: Run tests
        run: mvn -B -ntp test

      - name: Publish to Maven Central
        run: mvn -B -ntp -pl pojo-lens,pojo-lens-spring-boot-autoconfigure,pojo-lens-spring-boot-starter -am -Prelease-central -DskipTests -DwaitUntil=validated deploy
