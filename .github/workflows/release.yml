name: Release

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-central:
    runs-on: ubuntu-latest
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java, Maven server credentials, and GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Validate release tag matches pom version
        if: startsWith(github.ref, 'refs/tags/release-')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#release-}"
          POM_VERSION="$(mvn -q -DforceStdout -f pom.xml help:evaluate -Dexpression=project.version)"
          echo "Tag version: ${TAG_VERSION}"
          echo "POM version: ${POM_VERSION}"
          if [ "${TAG_VERSION}" != "${POM_VERSION}" ]; then
            echo "Tag version and pom version do not match."
            exit 1
          fi

      - name: Run tests
        run: mvn -B -ntp test

      - name: Publish to Maven Central
        run: mvn -B -ntp -pl pojo-lens,pojo-lens-spring-boot-autoconfigure,pojo-lens-spring-boot-starter -am -Prelease-central -DskipTests deploy
